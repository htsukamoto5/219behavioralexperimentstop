<!DOCTYPE html>
<html>
<head>
  <title>Odd One Out Experiment</title>

  <!-- jsPsych core + plugins — pinned to same versions as your skeleton -->
  <script src="https://unpkg.com/jspsych@8.2.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey@4.0.0"></script>
  <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" />
  <link href="https://unpkg.com/@jspsych/plugin-survey@4.0.0/css/survey.min.css" rel="stylesheet" />

  <!-- Custom odd-one-out plugin -->
  <script src="jspsych-odd-one-out.js"></script>

  <!-- Category definitions (defines global `CATEGORIES`) -->
  <script src="categories.js"></script>

  <!-- Pre-generated trial data (defines global `TRIALS`) -->
  <script src="trials.js"></script>

  <!-- jsPsych Pipe plugin for sending data to a server in real-time -->
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>

  <style>
    body { margin: 0; padding: 0; background: #ffffff; }
    .exp-text {
      width: 60vw;
      margin: auto;
      font-family: system-ui, sans-serif;
      font-size: clamp(14px, 1.6vw, 20px);
      line-height: 1.7;
      text-align: center;
    }
  </style>
</head>
<body>
<script>

// ═══════════════════════════════════════════════════════════════════════════════
// CONFIGURATION — edit this section to adjust the experiment
// ═══════════════════════════════════════════════════════════════════════════════

var CONFIG = {
  stimuli_base: "stimuli/",
  practice_present_folder: "spoons_fork",
  practice_absent_folder:  "spoon",
  trials_per_participant: 60,
  break_after_trial: 30,
  demo_present_image: "demonstration_images/DemonstrationB.png",
  demo_absent_image:  "demonstration_images/DemonstrationA.png",
  // All possible prevalences — one is picked randomly at runtime
  prevalence_options: [0.10, 0.30, 0.50, 0.70, 0.90],
};

// ── Pick prevalence randomly at participant start ─────────────────────────
var target_present_prevalence = CONFIG.prevalence_options[
  Math.floor(Math.random() * CONFIG.prevalence_options.length)
];
console.log("Assigned prevalence:", target_present_prevalence);

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/**
 * Extract the base category name from a trial ID.
 * Present trials look like "present_spoons_fork" → base = "spoons"
 * Absent trials look like "absent_spoon" → base = "spoon"
 * We match by finding the absent trial's category within the present trial's category,
 * or we rely on the CATEGORY_MAP label to group them.
 *
 * Simpler approach: group by their shared CATEGORY_MAP label.
 */
function getCategoryLabel(trialData) {
  var key = trialData.category; // folder name, e.g. "spoons_fork" or "spoon"
  return (CATEGORY_MAP[key] && CATEGORY_MAP[key].label)
    ? CATEGORY_MAP[key].label
    : key;
}

function selectExperimentalTrials(allTrials) {
  var excludedIds = [
    "present_" + CONFIG.practice_present_folder,
    "absent_"  + CONFIG.practice_absent_folder,
  ];

  var pool = allTrials.filter(function (t) {
    return excludedIds.indexOf(t.id) === -1;
  });

  var presentPool = pool.filter(function (t) { return t.target_present; });
  var absentPool  = pool.filter(function (t) { return !t.target_present; });

  // Build a map: label → { present: trial|null, absent: trial|null }
  // so we can enforce mutual exclusion at the category level
  var categoryMap = {};

  presentPool.forEach(function (t) {
    var label = getCategoryLabel(t);
    if (!categoryMap[label]) categoryMap[label] = { present: null, absent: null };
    categoryMap[label].present = t;
  });

  absentPool.forEach(function (t) {
    var label = getCategoryLabel(t);
    if (!categoryMap[label]) categoryMap[label] = { present: null, absent: null };
    categoryMap[label].absent = t;
  });

  // Only keep categories that have BOTH a present and absent version
  // (so mutual exclusion can be enforced, and so 10%/90% are feasible)
  var validLabels = Object.keys(categoryMap).filter(function (label) {
    return categoryMap[label].present !== null && categoryMap[label].absent !== null;
  });

  validLabels = shuffle(validLabels);

  var n        = CONFIG.trials_per_participant;
  var nPresent = Math.round(n * target_present_prevalence);
  var nAbsent  = n - nPresent;

  if (nPresent + nAbsent > validLabels.length) {
    console.warn(
      "Not enough unique categories (" + validLabels.length + ") for " +
      n + " trials. Reducing trial count."
    );
    // Scale down proportionally
    var scale = validLabels.length / n;
    nPresent = Math.round(nPresent * scale);
    nAbsent  = validLabels.length - nPresent;
  }

  var selectedTrials = [];

  // Assign each label to either present or absent — never both
  validLabels.slice(0, nPresent).forEach(function (label) {
    selectedTrials.push(categoryMap[label].present);
  });
  validLabels.slice(nPresent, nPresent + nAbsent).forEach(function (label) {
    selectedTrials.push(categoryMap[label].absent);
  });

  return shuffle(selectedTrials);
}

/** Convert a trials.json entry into a jsPsych trial object */
function makeOddOneOutTrial(trialData, showAnswer) {
  // Look up the display label from CATEGORY_MAP using the category folder name
  var categoryKey = trialData.category;
  var categoryLabel = (CATEGORY_MAP[categoryKey] && CATEGORY_MAP[categoryKey].label)
    ? CATEGORY_MAP[categoryKey].label
    : trialData.category.toUpperCase(); // fallback to raw folder name

  return {
    type:           jsPsychOddOneOut,
    category:       categoryLabel,        // ← now uses the human-readable label
    images:         trialData.images,
    base_path:      CONFIG.stimuli_base + trialData.presence_folder + "/" + trialData.category + "/",
    target_present: trialData.target_present,
    odd_file:       trialData.odd_file,
    show_answer:    showAnswer || false,
    data: {
      trial_id:       trialData.id,
      is_practice:    showAnswer || false,
    },
  };
}

/** Find a trial in allTrials by presence folder + category folder name */
function findTrial(allTrials, presenceFolder, categoryFolder) {
  var id = presenceFolder + "_" + categoryFolder;
  var match = allTrials.filter(function (t) { return t.id === id; });
  if (match.length === 0) {
    console.warn('Practice trial not found: "' + id + '". Check folder names in CONFIG.');
    return null;
  }
  return match[0];
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT jsPsych
// ═══════════════════════════════════════════════════════════════════════════════

var jsPsych = initJsPsych({});

// Tag all trials with the assigned prevalence
jsPsych.data.addProperties({
  assigned_prevalence: target_present_prevalence,
});

// ── Subject / DataPipe setup ──────────────────────────────────────────────
const subject_id = jsPsych.randomization.randomID(10);
const filename   = `${subject_id}.csv`;

// Tag all trials with the subject ID and assigned prevalence
jsPsych.data.addProperties({
  subject_id:           subject_id,
  assigned_prevalence:  target_present_prevalence,
});

// ═══════════════════════════════════════════════════════════════════════════════
// BUILD TIMELINE FROM PRE-GENERATED TRIAL DATA
// ═══════════════════════════════════════════════════════════════════════════════

if (typeof TRIALS === "undefined") {
  throw new Error("Could not find TRIALS global. Make sure trials.js is loaded before this script, and that you have run `node generate_trials.js` to generate it.");
}
var allTrials = TRIALS;

var experimentalTrials = selectExperimentalTrials(allTrials);

// Preload all images the participant will see (practice + experimental)
var practicePresent = findTrial(allTrials, "present", CONFIG.practice_present_folder);
var practiceAbsent  = findTrial(allTrials, "absent",  CONFIG.practice_absent_folder);

var allImagePaths = [];
[practicePresent, practiceAbsent].forEach(function (t) {
  if (!t) return;
  t.images.forEach(function (img) {
    allImagePaths.push(CONFIG.stimuli_base + t.presence_folder + "/" + t.category + "/" + img.file);
  });
});
experimentalTrials.forEach(function (t) {
  t.images.forEach(function (img) {
    allImagePaths.push(CONFIG.stimuli_base + t.presence_folder + "/" + t.category + "/" + img.file);
  });
});

// ── TIMELINE ─────────────────────────────────────────────────────────────
var timeline = [];

// ── Prolific ID ───────────────────────────────────────────────────────────
timeline.push({
  type: jsPsychSurvey,
  survey_json: {
    showQuestionNumbers: false,
    elements: [
      {
        type: "text",
        title: "Please enter your Prolific ID:",
        name: "prolific_id",
        isRequired: true,
      },
    ],
  },
  on_finish: function (data) {
    // Pull the ID out and tag every subsequent trial with it
    var prolificId = data.response.prolific_id;
    jsPsych.data.addProperties({ prolific_id: prolificId });
  },
});

// ── Preload ───────────────────────────────────────────────────────────────
timeline.push({
  type: jsPsychPreload,
  images: allImagePaths.concat([
    CONFIG.demo_present_image,
    CONFIG.demo_absent_image,
  ]),
});

// ── Welcome ───────────────────────────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: "<div class='exp-text'><p>Welcome to our experiment!</p><p>Press any key to begin.</p></div>",
});

// ── Instructions ──────────────────────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p>In this experiment, you will be presented with images of items that are in the same category",
    " (e.g. clothes, shapes, food).</p>",
    "<p>Your task is to identify whether any item does <strong>not</strong> fit that category.</p>",
    "<ul style='text-align:left;display:inline-block;line-height:2'>",
    "<li>If an item does not fit, <strong>click on it</strong>.</li>",
    "<li>If all items fit, click the <strong>\"All fit the category\"</strong> button.</li>",
    "</ul>",
    "<p>Press any key to see a demonstration.</p>",
    "</div>",
  ].join(""),
});

// ── Demonstration: target present ─────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p><strong>Example: one item does NOT fit the category.</strong></p>",
    "<img style='width:80vw;' src='" + CONFIG.demo_present_image + "' alt='demonstration present' />",
    "<p>Press any key to continue.</p>",
    "</div>",
  ].join(""),
});

// ── Demonstration: target absent ──────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p><strong>Example: all items fit the category.</strong></p>",
    "<img style='width:80vw;' src='" + CONFIG.demo_absent_image + "' alt='demonstration absent' />",
    "<p>Press any key to continue.</p>",
    "</div>",
  ].join(""),
});

// ── Practice instructions ─────────────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p>First, you will complete <strong>2 practice trials</strong>.</p>",
    "<p>In the practice trials, the correct answer will be shown after each response.</p>",
    "<p>Press any key to continue to the practice trials.</p>",
    "</div>",
  ].join(""),
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p>On the next screen there will be photos of objects within a category.",
    " The category will be shown at the top of the screen.</p>",
    "<p>If there is an item that does not fit, click on it.",
    " If all items fit, click the <strong>\"All fit the category\"</strong> button.</p>",
    "<p>After selecting, click <strong>Confirm</strong> to lock in your answer.</p>",
    "<p>Press any key to begin the practice.</p>",
    "</div>",
  ].join(""),
});

// ── Practice trial 1: target present (show_answer = true) ─────────────────
if (practicePresent) {
  timeline.push(makeOddOneOutTrial(practicePresent, true));
}

// ── Practice trial 2: target absent (show_answer = true) ──────────────────
if (practiceAbsent) {
  timeline.push(makeOddOneOutTrial(practiceAbsent, true));
}

// ── Real trial instructions ───────────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p>Now you are ready to begin the experiment!</p>",
    "<p>The procedure is the same as the practice trials, but you will",
    " <strong>not</strong> receive feedback after each trial.</p>",
    "<p>There will be <strong>" + experimentalTrials.length + " trials</strong> in total.</p>",
    "<p>There will be an opportunity to take a break halfway through.",
    " Try to respond as efficiently and accurately as possible.</p>",
    "<p>Press any key to begin!</p>",
    "</div>",
  ].join(""),
});

// ── Fullscreen (start just before experimental trials) ────────────────────
timeline.push({
  type: jsPsychFullscreen,
  fullscreen_mode: true,
});

// ── Experimental trials with halfway break ────────────────────────────────
experimentalTrials.forEach(function (trialData, idx) {

  // Insert break screen before the trial that follows break_after_trial
  if (idx === CONFIG.break_after_trial) {
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: [
        "<div class='exp-text'>",
        "<p>You're halfway through the experiment!</p>",
        "<p>Feel free to take a short break if you need one.</p>",
        "<p>Press any key when you are ready to continue.</p>",
        "</div>",
      ].join(""),
    });
  }

  timeline.push(makeOddOneOutTrial(trialData, false));
});

// ── End of trials ─────────────────────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p>You've completed the experimental phase.</p>",
    "<p>Now we will ask a few short demographic questions.</p>",
    "<p>Press any key to continue.</p>",
    "</div>",
  ].join(""),
});

// ── Demographics survey ───────────────────────────────────────────────────
const trial = {
 type: jsPsychSurvey,
 survey_json: {
   showQuestionNumbers: false,
   elements:
     [
        {
             type: 'text',
             title: 'How old are you?',
             name: 'age',
             isRequired: true,
             inputType: 'number',
             min: 18,
             max: 120
           },
         {
        type: 'radiogroup',
        title: "What is your gender?",
        name: 'Gender',
        isRequired: true,
        choices: [
          'Female',
          'Male',
          'Non-binary'
        ],
        hasOther: true,
        otherText: 'Other (please specify)'
      },
       {
      type: 'slider',
      name: 'perceived_accuracy',
      title: "What percentage of trials do you think you got correct?",
      isRequired: true,
      min: 0,
      max: 100,
      step: 1
      },
            {
     type: 'slider',
  name: 'perceived_prevalence',
  title: "What percentage of trials do you think contained anomalous objects?",
  isRequired: true,
  min: 0,
  max: 100,
  step: 1
         },
        {
  type: 'radiogroup',
  title: "How difficult was it to identify the targets?",
  name: 'difficulty',
  isRequired: true,
  choices: [
    { value: 1, text: "Very easy" },
    { value: 2, text: "Easy" },
    { value: 3, text: "Moderate" },
    { value: 4, text: "Difficult" },
    { value: 5, text: "Very difficult" }
  ]
}
   ]
 }
};
timeline.push(trial);

// ── Congratulations ───────────────────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p>Congratulations! You have completed the experiment.</p>",
    "<p>Thank you for your participation!</p>",
    "<p>Press any key to finish and save your data.</p>",
    "</div>",
  ].join(""),
});

// ── Save data to OSF via DataPipe ─────────────────────────────────────────
timeline.push({
  type: jsPsychPipe,
  action: "save",
  experiment_id: "FWf3kwfMjnnH",   // ← your DataPipe experiment ID
  filename: filename,
  data_string: () => jsPsych.data.get().csv(),
});

// ── Redirect to Prolific ──────────────────────────────────────────────────
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: [
    "<div class='exp-text'>",
    "<p>Your data has been saved. Thank you for participating!</p>",
    "<p>You will now be redirected to Prolific.</p>",
    "<p>If you are not redirected automatically, ",
    "<a href='https://app.prolific.com/submissions/complete?cc=CZ8HPNTM'>click here</a>.</p>",
    "</div>",
  ].join(""),
  trial_duration: 3000,   // auto-redirects after 3 seconds
  on_finish: function () {
    window.location = "https://app.prolific.com/submissions/complete?cc=CZ8HPNTM";
  },
});

// ── Run ───────────────────────────────────────────────────────────────────
jsPsych.run(timeline);


</script>
</body>
</html>
